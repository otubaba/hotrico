{% extends 'base.html' %}

{% block content %}

<div class="max-w-2xl mx-auto mt-10 bg-white shadow p-6 rounded">

    <h2 class="text-2xl font-bold mb-4 text-blue-900">
        Send Message
    </h2>

    <!-- Receiver Info -->
    <div class="mb-4 p-3 bg-gray-100 rounded">
        <p class="text-sm text-gray-600">To:</p>
        <p class="font-semibold text-lg">
            {{ receiver.get_full_name }}
        </p>
    </div>

    <!-- MESSAGE FORM -->
    <form method="POST">
        {% csrf_token %}

        <label class="block mb-2 font-medium">
            Message
        </label>

        <textarea name="message"
                  rows="5"
                  class="w-full border rounded p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="Write your message here..."
                  required></textarea>

        <button type="submit"
                class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded">
            Send Message
        </button>

    </form>

    <!-- QUICK LINKS -->
    <div class="mt-6 flex justify-between text-sm">

        <a href="{% url 'inbox' %}" class="text-blue-600 hover:underline">
            ← Back to Inbox
        </a>

    </div>

</div>

{% endblock %}
