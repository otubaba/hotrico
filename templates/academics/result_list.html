{% extends 'base.html' %}

{% block content %}

<h2 class="text-xl font-bold">My Results</h2>

<a href="{% url 'academics:result_add' %}" class="bg-blue-600 text-white px-3 py-2">
    Add Result
</a>

<table class="w-full bg-white mt-4">
<tr>
    <th>Student</th>
    <th>Subject</th>
    <th>Total</th>
    <th>Actions</th>
</tr>

{% for r in object_list %}
<tr>
    <td>{{ r.registration.student }}</td>
    <td>{{ r.registration.subject }}</td>
    <td>{{ r.total }}</td>

    <td>
        <a href="{% url 'academics:result_edit' r.id %}">Edit</a> |
        <a href="{% url 'academics:result_delete' r.id %}">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
