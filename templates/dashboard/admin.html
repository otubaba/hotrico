{% extends 'base.html' %}

{% block content %}

<div class="grid md:grid-cols-3 gap-4">

    <div class="bg-white p-4 rounded shadow">
        <h3>Total Students</h3>
        <p class="text-2xl font-bold">{{ total_students }}</p>
    </div>

    <div class="bg-white p-4 rounded shadow">
        <h3>Total Classes</h3>
        <p class="text-2xl font-bold">{{ total_classes }}</p>
    </div>

</div>

<h2 class="mt-6 text-xl font-bold">Recent Results</h2>

<table class="w-full mt-3">
    <tr>
        <th>Student</th>
        <th>Subject</th>
        <th>Total</th>
    </tr>

    {% for r in results %}
    <tr>
        <td>{{ r.student }}</td>
        <td>{{ r.subject }}</td>
        <td>{{ r.total }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
