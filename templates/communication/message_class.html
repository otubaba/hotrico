{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-4">
    {{ classroom.name }}
</h2>

<form method="post">
    {% csrf_token %}

    <textarea
        name="content"
        rows="5"
        class="w-full border rounded p-3"
        placeholder="Type announcement to class..."></textarea>

    <button
        type="submit"
        class="mt-3 bg-blue-600 text-white px-4 py-2 rounded">
        Send To Class
    </button>

</form>

{% endblock %}
